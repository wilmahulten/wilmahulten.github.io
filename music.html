<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
    		<link rel="preconnect" href="https://fonts.gstatic.com">
		<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@200;400&display=swap" rel="stylesheet">
		<title>~Music~</title>
		<style>
      			html {
   				margin: 0px;
   				height: 100%;
   				width: 100%;
			}
			body {
				background-color: #d6d0d0;
        			margin: 0px;
        			min-height: 100%;
				cursor: auto;
			}
      			#content {
        			width: 50%;
        			margin: auto;
        			padding: 10px;
        			font-family: "Spectral", monospace;
      			}
			h1 {
      				font-size: 45px;
        			letter-spacing: 30px;
       				font-weight: 100;
        			font-style: normal;
        			font-kerning: normal;
        			text-align: center;
        			padding: 3%;
				cursor: crosshair;
      			}
			h1 a {
				cursor: crosshair;
				color: black;
			}
			h1 a:link {
				text-decoration: none;
			}
			h1 a:visited {
        			text-decoration: none;
      			}
      			.topnav {
        			border: 1px solid black;
        			border-width: 1px 0;
        			list-style: none;
        			margin: 0;
        			padding: 0;
        			text-align: center;
      			}
      			.topnav li {
        			display: inline;
      			}
      			.topnav a {
				width: 25%;
				color: black;
				font-size: 20px;
				letter-spacing: 4px;
				font-weight: 400;
				display: inline-block;
				padding: 10px;
			}
			.topnav a:link {
				text-decoration: none;
			}
			.topnav a:visited {
				text-decoration: underline;
			}
			.topnav a:hover {
				text-decoration: underline;
			}
			.topnav a:active {
				text-decoration: underline;
				color: red;
			}
			p {
				font-size: 16px;
				letter-spacing: 1px;
				font-weight: 300;
			}
			#horizontalSpace {
				display:block;
				height: 100px;
			}
			#player {
				width: 85%;
				opacity: 0.7;
				margin: auto;
			}
		</style>
	</head>
	<body>
    		<div id="content">
			<h1><a href="index.html">WILMA HULTÉN</a></h1>

    			<ul class="topnav">
      				<li><a href="index.html" class="active">Home</a></li>
      				<li><a href="music.html">Music</a></li>
      				<li><a href="about.html">About</a></li>
    			</ul>
    			<span id="horizontalSpace"></span>
    			<div id="player">
    				<iframe width="100%" height="60%" scrolling="no" frameborder="no"
				src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/440137653&color=%23000000&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true">
				</iframe>
    			</div>
		</div>
	</body>
</html>
